name: Build Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'

      - name: Create fresh Flutter project
        run: |
          flutter create --platforms android scanly_build

      - name: Copy project files
        run: |
          cp -r home/user/scanly/lib scanly_build/
          cp -r home/user/scanly/assets scanly_build/ 2>/dev/null || true
          cp home/user/scanly/pubspec.yaml scanly_build/

      - name: Get dependencies
        run: |
          cd scanly_build
          flutter pub get

      - name: Generate Hive adapters
        run: |
          cd scanly_build
          dart run build_runner build --delete-conflicting-outputs || true

      - name: Build Release APK
        run: |
          cd scanly_build
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: scanly-release-apk
          path: scanly_build/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

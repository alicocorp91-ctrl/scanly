name: Build Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - Find pubspec.yaml
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== All files ==="
          ls -la
          echo "=== Searching for pubspec.yaml ==="
          find . -name "pubspec.yaml" -type f

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'

      - name: Get dependencies
        run: |
          PUBSPEC=$(find . -name "pubspec.yaml" -type f | head -1)
          if [ -z "$PUBSPEC" ]; then
            echo "pubspec.yaml bulunamadı!"
            exit 1
          fi
          DIR=$(dirname "$PUBSPEC")
          echo "pubspec.yaml bulundu: $PUBSPEC"
          cd "$DIR"
          flutter pub get

      - name: Build Release APK
        run: |
          PUBSPEC=$(find . -name "pubspec.yaml" -type f | head -1)
          DIR=$(dirname "$PUBSPEC")
          cd "$DIR"
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: scanly-release-apk
          path: '**/app-release.apk'
          retention-days: 30

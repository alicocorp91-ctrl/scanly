name: scanly
description: "Profesyonel belge tarama uygulaması - CamScanner kalitesinde, tamamen ücretsiz"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ==================== STATE MANAGEMENT ====================
  flutter_riverpod: ^2.5.1          # State yönetimi için
  riverpod_annotation: ^2.3.5       # Riverpod için annotation desteği

  # ==================== VERİTABANI ====================
  hive: ^2.2.3                      # Yerel NoSQL veritabanı
  hive_flutter: ^1.1.0              # Hive'ın Flutter entegrasyonu

  # ==================== KAMERA & GÖRÜNTÜ ====================
  camera: ^0.9.4+21                 # Kamera entegrasyonu (stabil versiyon)
  image_picker: ^1.1.2              # Galeri'den fotoğraf seçme
  image: ^4.2.0                     # Görüntü işleme (filtreler için)
  path_provider: ^2.1.4             # Dosya yolları
  path: ^1.9.0                      # Dosya yolu işlemleri

  # ==================== PDF OLUŞTURMA ====================
  pdf: ^3.11.1                      # PDF oluşturma
  printing: ^5.13.4                 # PDF yazdırma ve paylaşım

  # ==================== İZİNLER & PAYLAŞIM ====================
  permission_handler: ^11.3.1       # Kamera ve depolama izinleri
  share_plus: ^10.0.2               # Dosya paylaşımı

  # ==================== OCR (METİN TANIMA) ====================
  google_mlkit_text_recognition: ^0.13.0   # Çevrimdışı metin tanıma
  google_mlkit_commons: ^0.7.1             # ML Kit ortak bileşenler

  # ==================== UI / UX ====================
  cupertino_icons: ^1.0.8           # iOS tarzı ikonlar
  flutter_svg: ^2.0.10              # SVG desteği
  intl: ^0.19.0                     # Tarih ve sayı formatlama
  file_picker: ^8.0.6               # Dosya seçici

  # ==================== YARDIMCI PAKETLER ====================
  uuid: ^4.4.2                      # Benzersiz ID oluşturma
  equatable: ^2.0.5                 # Nesne karşılaştırma
  shared_preferences: ^2.3.3        # Basit yerel depolama

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1            # Hive model generator

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/